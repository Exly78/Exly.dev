<script>
  (function(){
    const fit = document.getElementById('fit');
    function apply() {
      const w = window.innerWidth;
      const scale = w / 1680;
      fit.style.transform = 'scale(' + scale + ')';
      // collapse the post-scale empty space
      const inner = fit.firstElementChild;
      const h = inner ? inner.offsetHeight : 0;
      fit.style.height = (h * scale) + 'px';
    }
    const ro = new ResizeObserver(apply);
    window.addEventListener('resize', apply);
    window.addEventListener('load', () => { apply(); if (fit.firstElementChild) ro.observe(fit.firstElementChild); });
    apply();
    // re-apply after React mounts
    setTimeout(apply, 200);
    setTimeout(apply, 800);
    setTimeout(apply, 2000);
  })();
</script>

function VB_Cursor() {
  const dot = React.useRef(null);
  const ring = React.useRef(null);
  const blob = React.useRef(null);
  React.useEffect(() => {
    const root = (dot.current || blob.current)?.parentElement;
    if (!root) return;
    let tx = 0, ty = 0, rx = 0, ry = 0, bx = 0, by = 0, raf;
    const onMove = (e) => {
      const r = root.getBoundingClientRect();
      // compensate for any ancestor scale transform
      const sx = r.width / root.offsetWidth || 1;
      const sy = r.height / root.offsetHeight || 1;
      tx = (e.clientX - r.left) / sx;
      ty = (e.clientY - r.top) / sy;
      if (dot.current) dot.current.style.transform = `translate(${tx}px, ${ty}px)`;
    };
    const tick = () => {
      rx += (tx - rx) * 0.22; ry += (ty - ry) * 0.22;
      bx += (tx - bx) * 0.10; by += (ty - by) * 0.10;
      if (ring.current) ring.current.style.transform = `translate(${rx}px, ${ry}px)`;
      if (blob.current) blob.current.style.transform = `translate(${bx-120}px, ${by-120}px)`;
      raf = requestAnimationFrame(tick);
    };
    tick();
    window.addEventListener('mousemove', onMove);
    return () => { window.removeEventListener('mousemove', onMove); cancelAnimationFrame(raf); };
  }, []);
  return (
    <React.Fragment>
      <div ref={blob} style={{
        position:'absolute', left:0, top:0, width:240, height:240, borderRadius:'50%',
        background:'radial-gradient(circle, rgba(255,90,200,0.35), rgba(150,80,255,0.25) 40%, transparent 70%)',
        filter:'blur(30px)', pointerEvents:'none', zIndex:2, mixBlendMode:'screen',
        willChange:'transform',
      }}/>
      <div ref={ring} style={{
        position:'absolute', left:-20, top:-20, width:40, height:40, borderRadius:'50%',
        border:'1px solid rgba(255,158,230,0.7)', pointerEvents:'none', zIndex:50,
        mixBlendMode:'screen', willChange:'transform',
      }}/>
      <div ref={dot} style={{
        position:'absolute', left:-3, top:-3, width:6, height:6, borderRadius:'50%',
        background:'#ffd8f2', pointerEvents:'none', zIndex:51,
        boxShadow:'0 0 14px rgba(255,90,200,0.9)', willChange:'transform',
      }}/>
    </React.Fragment>
  );
}

function VB_Magnetic({ children, strength = 0.4 }) {
  const ref = React.useRef(null);
  const onMove = (e) => {
    const el = ref.current; if (!el) return;
    const r = el.getBoundingClientRect();
    el.style.transform = `translate(${(e.clientX-r.left-r.width/2)*strength}px, ${(e.clientY-r.top-r.height/2)*strength}px)`;
  };
  const onLeave = () => { if (ref.current) ref.current.style.transform = 'translate(0,0)'; };
  return <span ref={ref} onMouseMove={onMove} onMouseLeave={onLeave}
    style={{ display:'inline-block', transition:'transform .4s cubic-bezier(.2,.7,.3,1)'}}>{children}</span>;
}

function VB_ChromaticText({ children, size = 180, family = '"Archivo Black", sans-serif' }) {
  const [hover, setHover] = React.useState(false);
  return (
    <span onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{ position:'relative', display:'inline-block', fontFamily:family, fontSize:size, lineHeight:0.9, letterSpacing:'-0.02em' }}>
      <span style={{
        position:'absolute', inset:0, color:'#ff4fd8',
        transform: hover ? 'translate(-6px,0)' : 'translate(-2px,0)',
        transition:'transform .3s', opacity: 0.8, mixBlendMode:'screen',
      }}>{children}</span>
      <span style={{
        position:'absolute', inset:0, color:'#7a4fff',
        transform: hover ? 'translate(6px,0)' : 'translate(2px,0)',
        transition:'transform .3s', opacity: 0.8, mixBlendMode:'screen',
      }}>{children}</span>
      <span style={{ position:'relative', color:'#fff' }}>{children}</span>
    </span>
  );
}

function VB_Scramble({ text, delay = 0, style }) {
  const [v, setV] = React.useState(' '.repeat(text.length));
  React.useEffect(() => {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789#@*/<>';
    let frame = 0, id;
    const t = setTimeout(() => {
      const loop = () => {
        frame++;
        const done = Math.min(text.length, Math.floor(frame / 1.5));
        const out = text.split('').map((c, i) => {
          if (i < done) return c;
          if (c === ' ') return ' ';
          return chars[Math.floor(Math.random()*chars.length)];
        }).join('');
        setV(out);
        if (done < text.length) id = setTimeout(loop, 30);
      };
      loop();
    }, delay);
    return () => { clearTimeout(t); clearTimeout(id); };
  }, [text, delay]);
  return <span style={style}>{v}</span>;
}

}
